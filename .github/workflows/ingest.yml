name: AI Blog Post Ingestion

on:
  schedule:
    - cron: '0 0,12 * * *'  # 12:00 AM / 12:00 PM UTC → 8:00 AM / 8:00 PM PHT (UTC+8)
  workflow_dispatch:  # Manual trigger

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify RSS feeds resolve
        run: python3 backend/scripts/check_rss_feeds.py

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run ingestion pipeline
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          OPEN_ROUTER_API_KEY: ${{ secrets.OPEN_ROUTER_API_KEY }}
          STRIP_MARKDOWN_IMAGES: ${{ secrets.STRIP_MARKDOWN_IMAGES }}
          ALLOW_INLINE_IMAGE_DOMAINS: ${{ secrets.ALLOW_INLINE_IMAGE_DOMAINS }}
          VERIFY_INLINE_IMAGES: ${{ secrets.VERIFY_INLINE_IMAGES }}
          IMAGE_URL_CHECK_TIMEOUT_SECONDS: ${{ secrets.IMAGE_URL_CHECK_TIMEOUT_SECONDS }}
        run: python backend/src/main.py

      - name: Report status
        if: always()
        run: |
          echo "Ingestion job completed at $(date)"