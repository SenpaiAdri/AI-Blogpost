name: RSS feed health

on:
  pull_request:
    paths:
      - "backend/src/rss_feeds.py"
      - "backend/scripts/check_rss_feeds.py"
      - ".github/workflows/rss-health.yml"
  push:
    branches: [main]
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:

jobs:
  rss:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check RSS endpoints
        run: python3 backend/scripts/check_rss_feeds.py
